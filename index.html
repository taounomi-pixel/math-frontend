<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathVis - Theorem Visualization Platform</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link rel="stylesheet" href="/index.css">
</head>
<body>

  <!-- Background Math Vectors -->
  <div class="bg-vectors">
    <!-- Geometric shapes (Vanilla SVG) -->
    <svg class="math-vector shape-circle" viewBox="0 0 100 100" fill="none" stroke="currentColor">
      <circle cx="50" cy="50" r="48" stroke-width="1" stroke-dasharray="4 4" />
      <path d="M50 2 v96 M2 50 h96" stroke-width="0.5" />
    </svg>
    <svg class="math-vector shape-triangle" viewBox="0 0 100 100" fill="none" stroke="currentColor">
      <polygon points="50,10 90,90 10,90" stroke-width="1" stroke-dasharray="2 4"/>
      <circle cx="50" cy="63.3" r="26.6" stroke-width="0.5"/>
    </svg>
    
    <!-- Lightweight Unicode Math Symbols (no MathJax needed) -->
    <div class="math-vector symbol-pi">π</div>
    <div class="math-vector symbol-integral">∫</div>
    <div class="math-vector symbol-sigma">∑</div>
    <div class="math-vector symbol-infinity">∞</div>
    <div class="math-vector symbol-alpha">α</div>
    <div class="math-vector symbol-beta">β</div>
    <div class="math-vector symbol-phi">φ</div>
    <div class="math-vector symbol-theta">θ</div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
